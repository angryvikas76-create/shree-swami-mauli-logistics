<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Shipment | Shree Swami Mauli Logistics</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef3f8;
}

header{
background:#003366;
color:white;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
font-size:28px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

.banner{
background:linear-gradient(rgba(0,51,102,.85),rgba(0,51,102,.85)),url("https://images.unsplash.com/photo-1519003722824-194d4455a60c?q=80&w=1600&auto=format&fit=crop");
background-size:cover;
background-position:center;
padding:70px 20px;
text-align:center;
color:white;
}

.banner h1{
font-size:42px;
margin-bottom:10px;
}

.banner p{
font-size:20px;
}

.container{
width:90%;
max-width:1100px;
margin:40px auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.section-title{
background:#003366;
color:white;
padding:12px;
border-radius:6px;
margin-bottom:20px;
font-size:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

label{
font-weight:bold;
display:block;
margin-bottom:6px;
}

input,
textarea,
select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
margin-bottom:15px;
}

textarea{
height:90px;
resize:none;
}

.next-btn{
margin-top:20px;
background:#ff9800;
color:white;
padding:14px 35px;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

footer{
margin-top:50px;
background:#003366;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<div class="logo">
🚚 Shree Swami Mauli Logistics
</div>

<nav>
<a href="index.html">Home</a>
<a href="booking.html">Book Shipment</a>
<a href="track.html">Track Shipment</a>
</nav>

</header>

<section class="banner">

<h1>Shipment Booking</h1>

<p>Book your shipment quickly and securely.</p>

</section>

<div class="container">

<form id="bookingForm">

<div class="section-title">
👤 Sender Details
</div>

<div class="grid">

<div>

<label>Sender Name</label>

<input
type="text"
placeholder="Enter Sender Name"
required>

</div>

<div>

<label>Mobile Number</label>

<input
type="tel"
placeholder="Enter Mobile Number"
required>

</div>

</div>

<label>Pickup Address</label>

<textarea
placeholder="Enter Complete Pickup Address"
required></textarea>

<div class="section-title">
📍 Receiver Details
</div>

<div class="grid">

<div>

<label>Receiver Name</label>

<input
type="text"
placeholder="Enter Receiver Name"
required>

</div>

<div>

<label>Receiver Mobile</label>

<input
type="tel"
placeholder="Enter Mobile Number"
required>

</div>

</div>

<label>Delivery Address</label>

<textarea
placeholder="Enter Complete Delivery Address"
required></textarea><div class="section-title">
📦 Shipment Details
</div>

<div class="grid">

<div>
<label>Parcel Type</label>
<select required>
<option value="">Select Parcel Type</option>
<option>Documents</option>
<option>Electronics</option>
<option>Industrial Goods</option>
<option>Household Goods</option>
<option>Fragile Goods</option>
<option>Machinery</option>
<option>Other</option>
</select>
</div>

<div>
<label>Number of Boxes</label>
<input type="number" placeholder="Enter Number of Boxes" required>
</div>

<div>
<label>Total Weight (Kg)</label>
<input type="number" step="0.01" placeholder="Enter Weight" required>
</div>

<div>
<label>Length (cm)</label>
<input type="number" placeholder="Length" required>
</div>

<div>
<label>Width (cm)</label>
<input type="number" placeholder="Width" required>
</div>

<div>
<label>Height (cm)</label>
<input type="number" placeholder="Height" required>
</div>

<div>
<label>Pickup Date</label>
<input type="date" required>
</div>

<div>
<label>Pickup Time</label>
<input type="time" required>
</div>

<div>
<label>Payment Mode</label>
<select required>
<option>Cash</option>
<option>UPI</option>
<option>Bank Transfer</option>
<option>Credit Customer</option>
</select>
</div>

</div>

<label>Special Instructions</label>

<textarea placeholder="Write any special instructions..."></textarea>

<button class="next-btn" type="submit">
Book Shipment
</button>

<div id="success"
style="display:none;margin-top:25px;padding:20px;background:#d4edda;color:#155724;border-radius:8px;font-weight:bold;">
</div>

</form>

</div>

<footer>

<h3>Shree Swami Mauli Logistics</h3>

<p>Fast • Safe • Reliable Transport Services</p>

<p>© 2026 All Rights Reserved.</p>

</footer>

<script>

document.getElementById("bookingForm").addEventListener("submit",function(e){

e.preventDefault();

let booking="SSM"+Math.floor(Math.random()*900000+100000);

let msg=document.getElementById("success");

msg.style.display="block";

msg.innerHTML=
"✅ Booking Submitted Successfully!<br><br><b>Booking ID : "+booking+"</b><br><br>Please save this Booking ID for shipment tracking.";

this.reset();

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

});

</script>

</body>
</html>
